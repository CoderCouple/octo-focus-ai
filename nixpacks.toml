# Railway / Nixpacks build config.
#
# NODE_ENV=development is set INLINE on the install + build commands so
# pnpm reliably installs devDependencies (typescript, vitest, etc.). The
# start command doesn't need it — Railway injects NODE_ENV=production at
# runtime.
#
# To use this file: leave the service's "Build Command" field blank in the
# Railway dashboard. A non-empty Build Command overrides nixpacks.toml.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x"]

[phases.install]
cmds = ["NODE_ENV=development pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "NODE_ENV=development pnpm --filter @octofocus/shared --filter @octofocus/diagrams --filter @octofocus/ai build",
  "NODE_ENV=development pnpm --filter @octofocus/api build",
]

[start]
cmd = "pnpm --filter @octofocus/api start"
