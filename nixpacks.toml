[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = [
  "pnpm --filter @octofocus/shared --filter @octofocus/diagrams --filter @octofocus/ai build",
  "pnpm --filter @octofocus/api build",
]

[start]
cmd = "pnpm --filter @octofocus/api start"
